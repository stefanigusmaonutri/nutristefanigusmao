<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stéfani Gusmão | Nutricionista</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:      #1C2D4A;
      --terracota: #A85540;
      --bege:      #F0EBE1;
      --cobre:     #B5845A;
      --creme:     #FAF7F2;
      --muted:     #7A6E65;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: var(--navy);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
      position: relative;
      overflow-x: hidden;
    }

    /* decorative circles */
    body::before {
      content: '';
      position: fixed;
      top: -100px; right: -100px;
      width: 360px; height: 360px;
      border-radius: 50%;
      border: 1px solid rgba(181,132,90,0.15);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; left: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 1px solid rgba(181,132,90,0.1);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ── FOTO ── */
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(145deg, #2e4567, #1a2a40);
      border: 2px solid var(--cobre);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar svg {
      width: 52px; height: 52px;
      color: var(--cobre);
      opacity: 0.6;
    }

    /* substitua o bloco .avatar por uma tag <img> quando tiver a foto */

    /* ── NOME ── */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--bege);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.15;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--cobre);
      text-align: center;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .crn {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(240,235,225,0.3);
      margin-bottom: 36px;
    }

    /* ── DIVISOR ── */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--cobre), transparent);
      margin-bottom: 36px;
    }

    /* ── BOTÕES ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 28px;
      margin-bottom: 10px;
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-radius: 1px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn--primary {
      background: var(--terracota);
      color: var(--creme);
      border: 1px solid var(--terracota);
    }

    .btn--primary:hover {
      background: #923f2c;
      border-color: #923f2c;
      transform: translateY(-1px);
    }

    .btn--outline {
      background: transparent;
      color: var(--bege);
      border: 1px solid rgba(181,132,90,0.4);
    }

    .btn--outline:hover {
      background: rgba(181,132,90,0.1);
      border-color: var(--cobre);
      transform: translateY(-1px);
    }

    .btn svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* ── SEÇÃO LABEL ── */
    .section-label {
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(240,235,225,0.25);
      text-align: center;
      margin: 28px 0 16px;
      width: 100%;
    }

    /* ── REDES SOCIAIS ── */
    .socials {
      display: flex;
      gap: 16px;
      margin-top: 36px;
    }

    .social-link {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(181,132,90,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      border-color: var(--cobre);
      background: rgba(181,132,90,0.1);
    }

    .social-link svg {
      width: 18px; height: 18px;
      color: var(--cobre);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 48px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(240,235,225,0.2);
      text-align: center;
    }

    /* ── ANIMAÇÕES ── */
    .fade-up {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }
    .fade-up:nth-child(1)  { animation-delay: 0.1s; }
    .fade-up:nth-child(2)  { animation-delay: 0.2s; }
    .fade-up:nth-child(3)  { animation-delay: 0.3s; }
    .fade-up:nth-child(4)  { animation-delay: 0.35s; }
    .fade-up:nth-child(5)  { animation-delay: 0.4s; }
    .fade-up:nth-child(6)  { animation-delay: 0.45s; }
    .fade-up:nth-child(7)  { animation-delay: 0.5s; }
    .fade-up:nth-child(8)  { animation-delay: 0.55s; }
    .fade-up:nth-child(9)  { animation-delay: 0.6s; }
    .fade-up:nth-child(10) { animation-delay: 0.65s; }
    .fade-up:nth-child(11) { animation-delay: 0.7s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
